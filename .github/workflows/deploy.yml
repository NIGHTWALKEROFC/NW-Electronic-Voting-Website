name: Deploy ElectroVote

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Inject Firebase config into index.html
        env:
          K: ${{ secrets.FIREBASE_API_KEY }}
          D: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          P: ${{ secrets.FIREBASE_PROJECT_ID }}
          S: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          M: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          A: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          sed -i "s|%%FIREBASE_API_KEY%%|${K}|g" index.html
          sed -i "s|%%FIREBASE_AUTH_DOMAIN%%|${D}|g" index.html
          sed -i "s|%%FIREBASE_PROJECT_ID%%|${P}|g" index.html
          sed -i "s|%%FIREBASE_STORAGE_BUCKET%%|${S}|g" index.html
          sed -i "s|%%FIREBASE_MESSAGING_SENDER_ID%%|${M}|g" index.html
          sed -i "s|%%FIREBASE_APP_ID%%|${A}|g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
